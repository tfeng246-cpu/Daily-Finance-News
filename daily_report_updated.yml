on:
  schedule:
    - cron: '0 0 * * *' # 每天0点UTC，即北京时间8点
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies for WeasyPrint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-wqy-zenhei fonts-noto-cjk libpango-1.0-0 libharfbuzz-0 libfontconfig1

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Generate Reports (v1 and v2)
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Add other secrets if your script needs them
        run: |
          # We need to capture the output paths from the script
          output=$(python generate_report_updated.py)
          echo "Script output: $output"
          v1_path=$(echo "$output" | grep -o 'report_v1_original_[^,]*')
          v2_path=$(echo "$output" | grep -o 'report_v2_visual_[^,]*')
          echo "v1_pdf_path=$v1_path" >> $GITHUB_OUTPUT
          echo "v2_pdf_path=$v2_path" >> $GITHUB_OUTPUT

      - name: Send Email with Both PDFs
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          python send_report_updated.py ${{ steps.generate.outputs.v1_pdf_path }} ${{ steps.generate.outputs.v2_pdf_path }}
